<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Early Learning Subjects</title>

  <link rel="stylesheet" href="earlylearning.css" />
  <script defer src="earlylearning.js"></script>
</head>

<body class="el-body">

  <div class="el-shell">

    <header class="el-header">
      <h1 class="el-title">Choose a Subject</h1>
      <p class="el-subtitle">What do you want to learn today?</p>
    </header>

    <main class="el-main el-grid">

      <button class="el-card" data-category="literacy">
        <h2 class="el-card-title">Literacy</h2>
        <p class="el-card-text">Letters • Sounds • Rhyming</p>
      </button>

      <button class="el-card" data-category="math">
        <h2 class="el-card-title">Math</h2>
        <p class="el-card-text">Counting • Shapes • Patterns</p>
      </button>

      <button class="el-card" data-category="science">
        <h2 class="el-card-title">Science</h2>
        <p class="el-card-text">Animals • Weather • Plants</p>
      </button>

      <button class="el-card" data-category="lifeskills">
        <h2 class="el-card-title">Life Skills</h2>
        <p class="el-card-text">Sharing • Routines • Safety</p>
      </button>

    </main>

  </div>

</body>
</html>

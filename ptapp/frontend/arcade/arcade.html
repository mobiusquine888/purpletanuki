<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PurpleTanuki Arcade</title>
  <link rel="stylesheet" href="arcade.css" />
</head>

<body class="arc-root">

  <!-- HEADER BOX (Akinator-style) -->
  <div class="world-header-box">
    Choose Your World
  </div>

  <!-- TANUKI IMAGE -->
  <section class="tanuki-host">
    <img src="tanuki-host.png" alt="Purple Tanuki Host" class="tanuki-img" />
  </section>

  <!-- HYBRID CARD BUTTON GRID -->
  <section class="world-buttons">

    <!-- TOP ROW: 2 cards -->
    <div class="row-two">

      <!-- Math (NOW ACTIVE) -->
      <a href="/worlds/mathskills/index.html" class="btn-world btn-math">
        <div class="card-title">Math Skills</div>
        <div class="card-sub">Numbers · Patterns · Algebra</div>
      </a>

      <!-- Calm -->
      <a href="/worlds/calmfocus/calmfocus_worldmap.html" class="btn-world">
        <div class="card-title">Calm & Focus</div>
        <div class="card-sub">Breathing · Emotions · Mindfulness</div>
      </a>

    </div>

    <!-- BOTTOM ROW: 3 cards -->
    <div class="row-three">

      <!-- Life -->
      <a href="/worlds/lifeskills/worldmap_lifeskills.html" class="btn-world">
        <div class="card-title">Life Skills</div>
        <div class="card-sub">Wisdom · Habits · Growing Up</div>
      </a>

      <!-- Early -->
      <a href="/worlds/earlylearning/earlylearning_worldmap.html" class="btn-world">
        <div class="card-title">Early Learning</div>
        <div class="card-sub">Preschool · Kindergarten · Foundations</div>
      </a>

      <!-- BigKid -->
      <a href="/worlds/bigkidskills/worldmap_bigkids.html" class="btn-world">
        <div class="card-title">Big Kid Skills</div>
        <div class="card-sub">Math · Reading · Challenges</div>
      </a>

    </div>

  </section>

  <!-- PARENT BUTTON -->
  <a href="/parent-dashboard/index.html" class="parent-btn">Parent</a>

</body>
</html>

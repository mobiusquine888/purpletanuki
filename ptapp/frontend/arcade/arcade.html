<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PurpleTanuki Arcade</title>

  <!-- Reforged Arcade Styles -->
  <link rel="stylesheet" href="arcade.css" />
  <link rel="stylesheet" href="/games/theme/tanuki-theme.css" />
</head>

<body>

  <div class="arc-root">

    <!-- HEADER -->
    <div class="arc-header">
      <h1 class="arc-title">PurpleTanuki Arcade</h1>
      <p class="arc-subtitle">Choose your world</p>
    </div>

    <!-- PYRAMID LAYOUT -->
    <div class="arc-pyramid">

      <!-- TOP: CALM & FOCUS -->
      <a class="arc-block arc-top" id="world-calmfocus" href="/calmfocus/index.html">
        <div class="arc-block-title">Calm & Focus</div>
        <div class="arc-block-desc">Breathing • Emotions • Mindfulness</div>
      </a>

      <!-- MIDDLE ROW -->
      <div class="arc-middle-row">

        <!-- EARLY LEARNING -->
        <a class="arc-block arc-middle" id="world-earlylearning" href="/earlylearning/index.html">
          <div class="arc-block-title">Early Learning</div>
          <div class="arc-block-desc">Preschool • Kindergarten • Foundations</div>
        </a>

        <!-- BIG KID SKILLS -->
        <a class="arc-block arc-middle" id="world-bigkidskills" href="/bigkidskills/index.html">
          <div class="arc-block-title">Big Kid Skills</div>
          <div class="arc-block-desc">Math • Reading • Challenges</div>
        </a>

      </div>

      <!-- BOTTOM: LIFE SKILLS -->
      <a class="arc-block arc-bottom" id="world-lifeskills" href="/lifeskills/index.html">
        <div class="arc-block-title">Life Skills</div>
        <div class="arc-block-desc">Wisdom • Habits • Growing Up</div>
      </a>

    </div>

  </div>

  <!-- Minimal Arcade Logic -->
  <script src="arcade.js"></script>

  <!-- SINGLE Parent Button (correct) -->
  <a href="/frontend/parent-dashboard/index.html" class="parent-btn">Parent</a>

  <!-- World Access Enforcement -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const local = localStorage.getItem("pt_parent_settings");
      if (!local) return;

      const settings = JSON.parse(local);

      if (!settings.worldAccess.calmfocus)
        document.getElementById("world-calmfocus").style.display = "none";

      if (!settings.worldAccess.earlylearning)
        document.getElementById("world-earlylearning").style.display = "none";

      if (!settings.worldAccess.bigkidskills)
        document.getElementById("world-bigkidskills").style.display = "none";

      if (!settings.worldAccess.lifeskills)
        document.getElementById("world-lifeskills").style.display = "none";
    });
  </script>

</body>
</html>

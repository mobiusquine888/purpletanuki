<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Skills Subjects</title>

  <link rel="stylesheet" href="lifeskills.css" />
  <script defer src="lifeskills.js"></script>
</head>

<body class="ls-body">

  <div class="ls-shell">

    <header class="ls-header">
      <h1 class="ls-title">Choose a Life Skill</h1>
      <p class="ls-subtitle">What do you want to learn today?</p>
    </header>

    <main class="ls-main ls-grid">

      <button class="ls-card" data-category="habits">
        <h2 class="ls-card-title">Habits & Routines</h2>
        <p class="ls-card-text">Morning • Bedtime • Cleaning Up</p>
      </button>

      <button class="ls-card" data-category="social">
        <h2 class="ls-card-title">Social Skills</h2>
        <p class="ls-card-text">Sharing • Apologizing • Helping</p>
      </button>

      <button class="ls-card" data-category="safety">
        <h2 class="ls-card-title">Safety & Responsibility</h2>
        <p class="ls-card-text">Crossing • Asking for Help • Home Safety</p>
      </button>

      <button class="ls-card" data-category="wisdom">
        <h2 class="ls-card-title">Wisdom & Growing Up</h2>
        <p class="ls-card-text">Honesty • Mistakes • Bravery</p>
      </button>

    </main>

  </div>

</body>
</html>

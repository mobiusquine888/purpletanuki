<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progression</title>

  <link rel="stylesheet" href="progression.css" />
  <script defer src="progression.js"></script>

  <style>
    /* Optional: lock icon overlay */
    .lock-icon {
      width: 20px;
      height: 20px;
      background: url('/images/lock.png') center/contain no-repeat;
      opacity: 0.9;
      margin-left: 8px;
    }

    .world-card.locked {
      opacity: 0.35;
      filter: grayscale(0.7);
      pointer-events: none;
      position: relative;
    }

    .world-card.locked::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      background: url('/images/lock.png') center/contain no-repeat;
      opacity: 0.9;
    }

    /* Make world cards tappable */
    .world-card {
      cursor: pointer;
    }
  </style>

  <script>
    // WORLD → SUBJECT ROUTING
    function openWorld(worldKey) {
      const subscribed = localStorage.getItem("pt_subscription_v1") === "true";

      // Map world → grade
      const map = {
        calmfocus: "preschool",
        earlylearning: "preschool",
        bigkidskills: "grade1",
        lifeskills: "grade1"
      };

      const grade = map[worldKey];

      // Premium worlds require subscription
      const isPremiumWorld = grade === "grade1";

      if (!subscribed && isPremiumWorld) {
        window.location.href = "/progression/paywall.html?redirect=/progression/index.html";
        return;
      }

      // Route to world subject selection (or directly to lessons)
      window.location.href = `/subjects.html?grade=${grade}`;
    }
  </script>
</head>

<body>
  <!-- Floating Tanuki -->
  <div class="tanuki"></div>
  <div class="sparkles"></div>

  <!-- Main Progression Card -->
  <div class="progress-section">
    <h2>Your Journey</h2>

    <!-- WORLD CARDS -->
    <div class="world-card" id="world-calmfocus-card" onclick="openWorld('calmfocus')">
      <div class="world-name">Calm & Focus</div>
      <div class="ring" id="ring-calmfocus">0%</div>
    </div>

    <div class="world-card" id="world-earlylearning-card" onclick="openWorld('earlylearning')">
      <div class="world-name">Early Learning</div>
      <div class="ring" id="ring-earlylearning">0%</div>
    </div>

    <div class="world-card" id="world-bigkidskills-card" onclick="openWorld('bigkidskills')">
      <div class="world-name">Big Kid Skills</div>
      <div class="ring" id="ring-bigkidskills">0%</div>
    </div>

    <div class="world-card" id="world-lifeskills-card" onclick="openWorld('lifeskills')">
      <div class="world-name">Life Skills</div>
      <div class="ring" id="ring-lifeskills">0%</div>
    </div>

    <!-- Streak -->
    <div class="streak">🔥 Streak: <span id="streak-count">0</span> days</div>

    <!-- Badges -->
    <div class="badges">
      <div class="badge"></div>
      <div class="badge"></div>
      <div class="badge"></div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="btn continue-btn" onclick="continueLearning()">Continue Learning</button>
      <a href="/controls/index.html" class="btn parent-btn">Open Parent Controls</a>
      <a href="/arcade/index.html" class="btn arcade-btn">Return to Arcade</a>
    </div>
  </div>
</body>
</html>

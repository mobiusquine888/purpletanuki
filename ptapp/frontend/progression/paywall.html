<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unlock the Magic</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #7b4bff, #2b1040);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .paywall-card {
      background: rgba(15, 5, 30, 0.9);
      border-radius: 24px;
      padding: 24px 20px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
      text-align: center;
    }
    .headline {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subhead {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 16px;
    }
    .feature-list {
      text-align: left;
      font-size: 14px;
      margin: 16px 0;
    }
    .feature-list li {
      margin-bottom: 6px;
    }
    .cta {
      margin-top: 16px;
    }
    .cta button {
      width: 100%;
      padding: 12px 16px;
      border-radius: 999px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: #2b1040;
      background: linear-gradient(135deg, #ffd86b, #ffb347);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.5);
    }
    .cta button:active {
      transform: translateY(1px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
    }
    .secondary {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.8;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
  <script src="progression/paywall.js"></script>
  <script>
    function getRedirectTarget() {
      const params = new URLSearchParams(window.location.search);
      return params.get("redirect") || "arcade.html";
    }

    function handleSubscribe() {
      unlockPremium();
      window.location.href = getRedirectTarget();
    }

    function handleRestore() {
      // For now, just go back if already subscribed
      if (isSubscribed()) {
        window.location.href = getRedirectTarget();
      } else {
        alert("No active subscription found on this device.");
      }
    }
  </script>
</head>
<body>
  <div class="paywall-card">
    <div class="headline">Unlock All the Magic</div>
    <div class="subhead">
      Access every world, every subject, and every ritual with your PurpleTanuki guide.
    </div>
    <ul class="feature-list">
      <li>All subjects and levels unlocked</li>
      <li>Endless Arcade progression</li>
      <li>Daily rewards and streaks</li>
      <li>Parent insights and gentle guidance</li>
    </ul>
    <div class="cta">
      <button onclick="handleSubscribe()">Start Full Access</button>
      <div class="secondary" onclick="handleRestore()">Restore purchase</div>
    </div>
  </div>
</body>
</html>

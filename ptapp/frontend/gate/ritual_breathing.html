<!-- ptapp/frontend/gate/ritual_breathing.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Take a Breath</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #4b9dff, #120b33);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .bubble {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.8);
      animation: breathe 6s ease-in-out infinite;
      margin-bottom: 24px;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.8); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    .headline {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subhead {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 24px;
    }
    button {
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #ffd86b, #ffb347);
      color: #2b1040;
      box-shadow: 0 10px 24px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="bubble"></div>
  <div class="headline">Let’s Take a Breath</div>
  <div class="subhead">
    Follow the circle as it grows and shrinks.  
    When you’re ready, we’ll check what your grown‑ups set.
  </div>
  <button onclick="goNext()">I’m Ready</button>

  <script>
    function goNext() {
      window.location.href = "/gate/ritual_gate.html";
    }
  </script>
</body>
</html>

<!-- ptapp/frontend/gate/ritual_gate.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gate Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #7b4bff, #2b1040);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(15, 5, 30, 0.9);
      border-radius: 20px;
      padding: 24px 20px;
      max-width: 360px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
    }
    .headline {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subhead {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 16px;
    }
    button {
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #ffd86b, #ffb347);
      color: #2b1040;
      box-shadow: 0 10px 24px rgba(0,0,0,0.5);
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="headline">Checking Your Gate</div>
    <div class="subhead">
      Your grown‑ups set special rules for screens.  
      We’ll see if it’s time for learning, a break, or something else.
    </div>
    <button onclick="goNext()">Continue</button>
  </div>

  <script>
    function goNext() {
      window.location.href = "/gate/ritual_ready.html";
    }
  </script>
</body>
</html>

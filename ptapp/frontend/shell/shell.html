<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PTapp Shell</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- RELATIVE paths (Netlify-safe) -->
    <link rel="stylesheet" href="shell.css">
    <script defer src="shell.js"></script>

    <style>
        /* Splash Fade-In Overlay */
        #pt-splash {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.6s ease-out;
        }
        #pt-splash.pt-hide {
            opacity: 0;
            pointer-events: none;
        }

        /* Mute Button */
        #pt-mute-btn {
            position: fixed;
            top: 14px;
            right: 14px;
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.2s ease;
        }
        #pt-mute-btn:hover {
            background: rgba(255, 255, 255, 1);
        }
        #pt-mute-btn img {
            width: 22px;
            height: 22px;
            pointer-events: none;
        }
    </style>

    <script>
        window.addEventListener("load", () => {
            const splash = document.getElementById("pt-splash");
            setTimeout(() => {
                splash.classList.add("pt-hide");
            }, 150);
        });
    </script>
</head>

<body>

    <!-- Splash Fade-In -->
    <div id="pt-splash"></div>

    <!-- Mute Button -->
    <div id="pt-mute-btn">
        <img id="pt-mute-icon" src="/shell/icons/volume-on.png" alt="mute">
    </div>

    <!-- HIDDEN AUDIO PLAYER -->
    <audio id="pt-theme-audio" src="/shell/home-intro_PurpleTanuki.MP3" loop></audio>

    <!-- MAIN APP AREA (ONLY ELEMENT) -->
    <iframe
        id="pt-main-frame"
        src="home/home.html"
        class="pt-shell-main">
    </iframe>

</body>
</html>

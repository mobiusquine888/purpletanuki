<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PTapp Shell</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- RELATIVE paths (Netlify-safe) -->
    <link rel="stylesheet" href="shell.css">
    <script defer src="shell.js"></script>

    <style>
        /* Splash Fade-In Overlay */
        #pt-splash {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.6s ease-out;
        }
        #pt-splash.pt-hide {
            opacity: 0;
            pointer-events: none;
        }
    </style>

    <script>
        window.addEventListener("load", () => {
            const splash = document.getElementById("pt-splash");
            setTimeout(() => {
                splash.classList.add("pt-hide");
            }, 150);
        });
    </script>
</head>

<body>

    <!-- Splash Fade-In -->
    <div id="pt-splash"></div>

    <!-- HIDDEN AUDIO PLAYER -->
    <audio id="pt-theme-audio" src="/shell/home-intro_PurpleTanuki.MP3" loop></audio>

    <!-- MAIN APP AREA (ONLY ELEMENT) -->
    <iframe
        id="pt-main-frame"
        src="home/home.html"
        class="pt-shell-main">
    </iframe>

</body>
</html>

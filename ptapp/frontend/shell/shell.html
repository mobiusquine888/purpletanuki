<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PTapp Shell</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="shell.css">
    <script defer src="shell.js"></script>
</head>

<body>

    <!-- SHELL HEADER -->
    <header id="pt-shell-header">
        <div id="pt-shell-settings" class="pt-shell-icon">⚙️</div>
        <div id="pt-shell-title">PurpleTanuki</div>
        <div id="pt-shell-profile" class="pt-shell-icon">👤</div>
    </header>

    <!-- TANUKI BAR -->
    <iframe
        id="pt-tanuki-frame"
        src="/ptapp/frontend/tanuki/tanuki.html"
        class="pt-shell-tanuki">
    </iframe>

    <!-- MAIN APP AREA -->
    <iframe
        id="pt-main-frame"
        src=""
        class="pt-shell-main">
    </iframe>

</body>
</html>

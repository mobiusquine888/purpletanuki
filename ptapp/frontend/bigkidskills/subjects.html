<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big Kid Skills Subjects</title>

  <link rel="stylesheet" href="bigkidskills.css" />
  <script defer src="bigkidskills.js"></script>
</head>

<body class="bks-body">

  <div class="bks-shell">

    <header class="bks-header">
      <h1 class="bks-title">Choose a Skill</h1>
      <p class="bks-subtitle">What challenge do you want today?</p>
    </header>

    <main class="bks-main bks-grid">

      <button class="bks-card" data-category="reading">
        <h2 class="bks-card-title">Reading</h2>
        <p class="bks-card-text">Sight Words • Passages • Vocabulary</p>
      </button>

      <button class="bks-card" data-category="math">
        <h2 class="bks-card-title">Math</h2>
        <p class="bks-card-text">Addition • Place Value • Word Problems</p>
      </button>

      <button class="bks-card" data-category="logic">
        <h2 class="bks-card-title">Logic</h2>
        <p class="bks-card-text">Patterns • Deduction • Spatial Thinking</p>
      </button>

      <button class="bks-card" data-category="challenges">
        <h2 class="bks-card-title">Challenges</h2>
        <p class="bks-card-text">Quests • Timed Tasks • Puzzles</p>
      </button>

    </main>

  </div>

</body>
</html>

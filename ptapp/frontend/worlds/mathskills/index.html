<!DOCTYPE html>
<html lang="en">

    <title>Math Skills – Purple Tanuki</title>

    <!-- World-specific CSS -->
    <link rel="stylesheet" href="mathskills.css" />
</head>

<body class="mathskills-world">

    <!-- HEADER -->
    <header class="world-header">
        <h1>Math Skills</h1>
        <p class="world-subtitle">Number runes, glowing puzzles, tiny math adventures.</p>
    </header>

    <!-- WORLDMAP VISUAL -->
    <section class="worldmap">

        <!-- FLOATING RUNE ISLANDS -->
        <div class="rune-island island-1">
            <div class="rune-symbol">➕</div>
        </div>

        <div class="rune-island island-2">
            <div class="rune-symbol">✦</div>
        </div>

        <div class="rune-island island-3">
            <div class="rune-symbol">➗</div>
        </div>

    </section>

    <!-- LESSON GRID -->
    <section class="lesson-grid" id="lessonGrid">
        <!-- JS will populate lessons here -->
    </section>

    <!-- FOOTER -->
    <footer class="world-footer">
   <a href="https://www.purpletanuki.com" class="home-btn">🏠 Home</a>

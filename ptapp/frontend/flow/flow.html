<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PurpleTanuki Flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="flow.css">
    <script defer src="flow.js"></script>
</head>

<body>

    <div id="flow-container">

        <div id="flow-question-box">
            <div id="flow-question-text">Loading question...</div>
        </div>

        <div id="flow-buttons">
            <button class="flow-btn" data-answer="yes">Yes</button>
            <button class="flow-btn" data-answer="no">No</button>
            <button class="flow-btn" data-answer="probably">Probably</button>
            <button class="flow-btn" data-answer="probably-not">Probably Not</button>
            <button class="flow-btn" data-answer="dont-know">Don’t Know</button>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PurpleTanuki Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="browser.css" />
</head>

<body class="tb-root">

  <header class="tb-header">
    <div class="tb-title">PurpleTanuki Browser</div>
  </header>

  <main class="tb-main">

    <!-- URL BAR -->
    <form id="urlForm" class="tb-url-bar">
      <span id="lockIcon" class="tb-lock-icon">🔒</span>
      <input id="urlInput" type="text" placeholder="Type a website…" autocomplete="off" />
      <button type="submit" class="tb-go-btn">Go</button>
    </form>

    <!-- FRAME + SIMPLE LOCK OVERLAY -->
    <section class="tb-frame-wrap">

      <div id="lockOverlay" class="tb-overlay">
        <div class="tb-overlay-card">
          <div class="tb-overlay-title">Portal Locked</div>
          <div class="tb-overlay-text">Complete a quick challenge to open this portal.</div>
          <button id="startLessonBtn" class="tb-ritual-btn">Begin Challenge</button>
        </div>
      </div>

      <iframe id="browserFrame" class="tb-frame" src="about:blank"></iframe>
    </section>

    <!-- TIMER (hidden until unlocked) -->
    <section id="timerBar" class="tb-timer" hidden>
      Time remaining: <span id="timerText">00:00</span>
    </section>

  </main>

  <script src="browser.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Theme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="theme-modal.css">
    <script defer src="theme-modal.js"></script>
</head>

<body>
    <div id="theme-modal-backdrop"></div>

    <div id="theme-modal">
        <h2 id="theme-title">Choose Your Theme</h2>

        <div id="theme-options">
            <button class="theme-btn" data-theme="purple">Purple</button>
            <button class="theme-btn" data-theme="midnight">Midnight</button>
            <button class="theme-btn" data-theme="forest">Forest</button>
            <button class="theme-btn" data-theme="sunrise">Sunrise</button>
        </div>

        <button id="theme-close-btn">Close</button>
    </div>
</body>
</html>

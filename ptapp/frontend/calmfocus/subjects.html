<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calm & Focus Rituals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="calmfocus.css" />
  <script defer src="calmfocus.js"></script>
</head>

<body class="cf-body">

  <div class="cf-shell">

    <header class="cf-header">
      <h1 class="cf-title">Choose Your Calm</h1>
      <p class="cf-subtitle">
        What do you need right now?
      </p>
    </header>

    <main class="cf-main cf-grid">

      <!-- Breathing -->
      <button class="cf-card" data-category="breathing">
        <h2 class="cf-card-title">Breathing</h2>
        <p class="cf-card-text">Slow, gentle breaths with Tanuki.</p>
      </button>

      <!-- Emotions -->
      <button class="cf-card" data-category="emotions">
        <h2 class="cf-card-title">Feelings</h2>
        <p class="cf-card-text">Name your feelings and feel a bit better.</p>
      </button>

      <!-- Mindfulness -->
      <button class="cf-card" data-category="mindfulness">
        <h2 class="cf-card-title">Sparkles & Focus</h2>
        <p class="cf-card-text">Tiny games to notice your body and mind.</p>
      </button>

      <!-- Stories -->
      <button class="cf-card" data-category="stories">
        <h2 class="cf-card-title">Calm Stories</h2>
        <p class="cf-card-text">Short Tanuki stories for quiet moments.</p>
      </button>

    </main>

    <footer class="cf-footer">
      <a href="index.html" class="cf-secondary-link">Back to Calm & Focus Home</a>
    </footer>

  </div>

</body>
</html>

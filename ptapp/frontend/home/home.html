<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PurpleTanuki Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="home.css">
    <script defer src="home.js"></script>
</head>

<body>
    <div id="pt-home">

        <!-- CATEGORY GRID -->
        <div class="home-grid">

            <!-- Calm & Focus (Gate Ritual) -->
            <button id="btn-calm" class="home-btn">
                Calm & Focus
            </button>

            <!-- Challenge Me (Akinator) -->
            <button id="btn-challenge" class="home-btn">
                Challenge Me
            </button>

            <!-- Pre-K Curriculum -->
            <button id="btn-prek" class="home-btn">
                Pre‑K
            </button>

            <!-- Kindergarten Curriculum -->
            <button id="btn-kindergarten" class="home-btn">
                Kindergarten
            </button>

            <!-- Grade 7 Curriculum -->
            <button id="btn-grade7" class="home-btn">
                Grade 7
            </button>

            <!-- Life Lessons Curriculum -->
            <button id="btn-lifelessons" class="home-btn">
                Life Lessons
            </button>

        </div>
    </div>

    <!-- Forward first tap/click to Shell so audio can start -->
    <script>
        const forwardGesture = () => {
            parent.postMessage({ action: "user-gesture" }, "*");
            window.removeEventListener("click", forwardGesture);
            window.removeEventListener("touchstart", forwardGesture);
        };

        window.addEventListener("click", forwardGesture, { once: true });
        window.addEventListener("touchstart", forwardGesture, { once: true });
    </script>

    <!-- Progression Engine -->
    <script src="/progression/progression.js"></script>
    <script src="/progression/paywall.js"></script>

    <script>
        PT_Progression.applyWorldState("btn-calm", "calmfocus");
        PT_Progression.applyWorldState("btn-prek", "prek");
        PT_Progression.applyWorldState("btn-kindergarten", "kindergarten");
        PT_Progression.applyWorldState("btn-grade7", "grade7");
        PT_Progression.applyWorldState("btn-lifelessons", "lifelessons");
    </script>

</body>
</html>

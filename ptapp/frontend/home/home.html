<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PurpleTanuki Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="home.css">
    <script defer src="home.js"></script>
</head>

<body>
    <div id="pt-home">

        <!-- Tanuki center stage -->
        <img id="pt-home-tanuki" src="img/idle.png" alt="Tanuki">

        <!-- Tagline -->
        <h1 id="pt-home-title">I can guess what you're thinking…</h1>

        <!-- Challenge button -->
        <button id="pt-home-challenge-btn"
                data-target="../flow/flow.html">
            Challenge Me
        </button>

        <!-- Freemium entry points -->
        <div id="pt-home-entries">
            <button class="pt-entry-btn" data-target="../curriculum/prek/prek.html">Pre‑K</button>
            <button class="pt-entry-btn" data-target="../curriculum/k/k.html">Kindergarten</button>
            <button class="pt-entry-btn" data-target="../curriculum/grade7/math/grade7_math.html">Grade 7 Math</button>
            <button class="pt-entry-btn" data-target="../lifelessons/menu.html">Life Lessons</button>
        </div>

    </div>

    <script>
        // Send navigation requests to the Shell
        function sendNav(target) {
            window.parent.postMessage(
                { action: "navigate", target: target },
                "*"
            );
        }

        // Challenge Me button
        document.getElementById("pt-home-challenge-btn")
            .addEventListener("click", (e) => {
                sendNav(e.target.dataset.target);
            });

        // Entry buttons
        document.querySelectorAll(".pt-entry-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                sendNav(btn.dataset.target);
            });
        });
    </script>

</body>
</html>

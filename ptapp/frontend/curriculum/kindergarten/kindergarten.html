<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kindergarten Tutor — PurpleTanuki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Universal Theme -->
  <link rel="stylesheet" href="/curriculum/engine/universal.css">

  <!-- Kindergarten Theme -->
  <link rel="stylesheet" href="/curriculum/kindergarten/kindergarten.css">
</head>

<body>
  <div class="k-root">

    <!-- HEADER -->
    <header class="k-header">
      <h1 class="title">Kindergarten Tutor</h1>
      <p class="k-line">Tap to learn and fill the bar.</p>
    </header>

    <!-- HOME BUTTON -->
    <button class="home-btn" onclick="goHome()">Home</button>

    <!-- PROGRESS BAR -->
    <div class="progress-wrapper">
      <div class="progress-label">
        Kindergarten Progress
        <span id="progress-text">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>

    <!-- CATEGORY LIST -->
    <div id="subject-status-list" class="category-list">

      <button class="category-item" onclick="selectSubject('sightWords')">
        <div class="category-title">Sight Words</div>
        <div class="category-subtitle" id="sightWords-status">0 / 10</div>
      </button>

      <button class="category-item" onclick="selectSubject('phonics')">
        <div class="category-title">Phonics</div>
        <div class="category-subtitle" id="phonics-status">0 / 10</div>
      </button>

      <button class="category-item" onclick="selectSubject('numbers')">
        <div class="category-title">Numbers 1–20</div>
        <div class="category-subtitle" id="numbers-status">0 / 10</div>
      </button>

      <button class="category-item" onclick="selectSubject('addition')">
        <div class="category-title">Addition</div>
        <div class="category-subtitle" id="addition-status">0 / 8</div>
      </button>

      <button class="category-item" onclick="selectSubject('shapesColors')">
        <div class="category-title">Shapes & Colors</div>
        <div class="category-subtitle" id="shapesColors-status">0 / 8</div>
      </button>

      <button class="category-item" onclick="selectSubject('patterns')">
        <div class="category-title">Patterns</div>
        <div class="category-subtitle" id="patterns-status">0 / 6</div>
      </button>

    </div>

    <!-- LESSON CARD -->
    <div id="lesson-card" class="lesson-card" style="display:none;">
      <h2 id="lesson-subject-label" class="subject-label"></h2>
      <h3 id="lesson-title" class="lesson-title"></h3>
      <div id="lesson-body" class="lesson-body"></div>

      <button class="btn start-quiz-btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- QUIZ CARD -->
    <div id="quiz-card" class="quiz-card" style="display:none;">
      <h2 id="quiz-subject-label" class="subject-label"></h2>
      <h3 id="quiz-title" class="lesson-title"></h3>
      <p id="quiz-lesson-label" class="lesson-label"></p>

      <p id="quiz-prompt" class="quiz-prompt"></p>

      <div class="lesson-choices">
        <button id="choice-1" class="choice-btn"></button>
        <button id="choice-2" class="choice-btn"></button>
        <button id="choice-3" class="choice-btn"></button>
      </div>

      <p id="quiz-q-progress" class="quiz-progress"></p>

      <button class="btn back-btn" onclick="backToLesson()">Back</button>
    </div>

    <!-- SPARKLES -->
    <div id="sparkles" class="sparkles"></div>

    <!-- GRADUATION OVERLAY -->
    <div id="grad-overlay" class="grad-overlay" style="display:none;">
      <div class="grad-modal">
        <div class="grad-title">You finished Kindergarten!</div>
        <div class="grad-text">
          You filled the bar and completed all activities.
        </div>
        <button class="grad-btn" onclick="unlockReward()">Unlock Reward</button>
      </div>
    </div>

  </div>

  <!-- ENGINE + SUBJECT DATA -->
  <script src="/curriculum/engine/subject-engine.js"></script>
  <script src="/curriculum/kindergarten/kindergarten.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      loadSubjects(KINDERGARTEN_DATA, "Kindergarten");
    });
  </script>

</body>
</html>

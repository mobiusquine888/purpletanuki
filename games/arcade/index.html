<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Global theme -->
  <link rel="stylesheet" href="../theme/tanuki-theme.css">
  <!-- Arcade-specific styles -->
  <link rel="stylesheet" href="arcade.css">
</head>

<body>

  <div class="arcade-root">

    <!-- SIMPLE HEADER -->
    <header class="simple-header">
      <h1 class="simple-title">Purple Tanuki Arcade</h1>
    </header>

    <!-- TANUKI HERO IMAGE -->
    <img src="images/tanuki_arcade.png" class="arcade-tanuki-hero" alt="Purple Tanuki">

    <p class="simple-line">I'm ready when you are.</p>

    <!-- ⭐ URL BAR MOVED HERE (inside the Arcade) -->
    <div class="browser-chrome">
      <div class="browser-dots">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>

      <input
        id="arcade-url-input"
        class="browser-url"
        type="text"
        placeholder="https://www.youtube.com"
        autocomplete="off"
      />

      <button id="arcade-go-btn" class="browser-go-btn">Go</button>
    </div>
    <!-- END URL BAR -->

    <!-- SIMPLE BUTTONS -->
    <div class="simple-buttons">

      <!-- ============================
           CURRICULUM WORLDS
           ============================ -->
      <div class="simple-section-label">Curriculum Worlds</div>

      <button class="simple-button" onclick="window.location.href='../preschool/preschool.html'">
        Preschool Tutor
      </button>

      <!-- ⭐ FIXED KINDERGARTEN LINK -->
      <button class="simple-button" onclick="window.location.href='../kindergarten/kindergarten.html'">
        Kindergarten Tutor
      </button>

      <!-- ============================
           ARCADE GAMES
           ============================ -->
      <div class="simple-section-label">Arcade Games</div>

      <button class="simple-button" onclick="window.location.href='../reaction/index.html'">
        Star Catch (Game 1)
      </button>

      <button class="simple-button" onclick="window.location.href='../memory/index.html'">
        Rune Lantern Memory (Game 2)
      </button>

      <!-- ============================
           GATE & FOCUS
           ============================ -->
      <div class="simple-section-label">Gate & Focus</div>

      <button class="simple-button" id="youtube-btn">
        Gate Unlocked → YouTube
      </button>

    </div>

    <!-- FOCUS MODE TOGGLE -->
    <div id="focus-toggle" class="focus-toggle">
      Focus Mode: OFF
    </div>

  </div>

  <!-- Arcade JS -->
  <script src="arcade.js"></script>
</body>
</html>

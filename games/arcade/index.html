<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../theme/tanuki-theme.css">
  <link rel="stylesheet" href="arcade.css">

  <style>
    /* Browser preview block */
    .browser-preview {
      margin: 30px auto 40px auto;
      width: 90%;
      max-width: 480px;
      background: #1d1330;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    .browser-urlbar {
      background: #2a1f45;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #cfc6ff;
      text-align: left;
      margin-bottom: 12px;
      font-family: Nunito, sans-serif;
    }

    .browser-locked {
      background: #3a2a60;
      border-radius: 10px;
      padding: 30px;
      color: #d8cfff;
      font-size: 1rem;
      text-align: center;
      opacity: 0.7;
    }

    .browser-locked small {
      display: block;
      margin-top: 8px;
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .simple-section-label {
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <div class="arcade-root">

    <header class="simple-header">
      <h1 class="simple-title">Purple Tanuki Arcade</h1>
    </header>

    <img src="images/tanuki_arcade.png" class="arcade-tanuki-hero" alt="Purple Tanuki">

    <p class="simple-line">Choose your world.</p>

    <!-- ⭐ BROWSER PREVIEW (always visible, locked until ritual) -->
    <div class="browser-preview">

      <div class="browser-urlbar">
        https://you-may-browse-now/
      </div>

      <div class="browser-locked">
        🔒 The Browser World is locked.
        <small>Complete your learning ritual to unlock browsing.</small>
      </div>

    </div>

    <!-- ⭐ CURRICULUM WORLDS -->
    <div class="simple-buttons">

      <div class="simple-section-label">Curriculum Worlds</div>

      <button class="simple-button" onclick="window.location.href='../preschool/preschool.html'">
        Preschool Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../kindergarten/kindergarten.html'">
        Kindergarten Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade1/grade1.html'">
        1st Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade2/grade2.html'">
        2nd Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade3/grade3.html'">
        3rd Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade4/grade4.html'">
        4th Grade Tutor
      </button>

    </div>

  </div>

  <script src="arcade.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Global theme -->
  <link rel="stylesheet" href="../theme/tanuki-theme.css">
  <!-- Arcade-specific styles -->
  <link rel="stylesheet" href="arcade.css">
</head>

<body>
  <div class="arcade-root">

    <!-- SIMPLE HEADER -->
    <header class="simple-header">
      <h1 class="simple-title">Purple Tanuki Arcade</h1>
    </header>

    <!-- TANUKI HERO IMAGE -->
    <img src="images/tanuki_arcade.png" class="arcade-tanuki-hero" alt="Purple Tanuki">

    <p class="simple-line">Choose your world.</p>

    <!-- SIMPLE BUTTONS -->
    <div class="simple-buttons">

      <!-- ============================
           CURRICULUM WORLDS ONLY
           ============================ -->
      <div class="simple-section-label">Curriculum Worlds</div>

      <button class="simple-button" onclick="window.location.href='../preschool/preschool.html'">
        Preschool Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../kindergarten/index.html'">
        Kindergarten Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade1/index.html'">
        1st Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade2/index.html'">
        2nd Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade3/index.html'">
        3rd Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade4/index.html'">
        4th Grade Tutor
      </button>

      <!-- Future grades will be added here as they are built -->

    </div>

  </div>

  <!-- Arcade JS -->
  <script src="arcade.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../theme/tanuki-theme.css">
  <link rel="stylesheet" href="arcade.css">
</head>

<body>

  <!-- BROWSER-STYLE TOP BAR -->
  <div class="arc-browser-bar">
    <div class="arc-browser-controls">
      <span class="arc-dot red"></span>
      <span class="arc-dot yellow"></span>
      <span class="arc-dot green"></span>
    </div>

    <div class="arc-browser-url">
      <span class="arc-url-text">https://purple-tanuki.app/arcade</span>
    </div>
  </div>

  <div class="arc-root">

    <!-- HEADER -->
    <header class="arc-header-clean">
      <h1 class="arc-title">Purple Tanuki Learning Arcade</h1>
    </header>

    <!-- K–12 CORE -->
    <div class="arc-section">
      <h2 class="arc-section-title">K–12 Core Curriculum</h2>
      <div class="arc-buttons">

        <!-- Preschool & Kindergarten -->
        <button class="arc-btn" onclick="openGrade('preschool')">Preschool</button>
        <button class="arc-btn" onclick="openGrade('k')">Kindergarten</button>

        <!-- Grades 1–5 -->
        <button class="arc-btn" onclick="openGrade('1')">1st Grade</button>
        <button class="arc-btn" onclick="openGrade('2')">2nd Grade</button>
        <button class="arc-btn" onclick="openGrade('3')">3rd Grade</button>
        <button class="arc-btn" onclick="openGrade('4')">4th Grade</button>
        <button class="arc-btn" onclick="openGrade('5')">5th Grade</button>

        <!-- Grades 6–8 -->
        <button class="arc-btn" onclick="openGrade('6')">6th Grade</button>
        <button class="arc-btn" onclick="openGrade('7')">7th Grade</button>
        <button class="arc-btn" onclick="openGrade('8')">8th Grade</button>

        <!-- High School -->
        <button class="arc-btn" onclick="openGrade('9')">9th Grade</button>
        <button class="arc-btn" onclick="openGrade('10')">10th Grade</button>
        <button class="arc-btn" onclick="openGrade('11')">11th Grade</button>
        <button class="arc-btn" onclick="openGrade('12')">12th Grade</button>

      </div>
    </div>

    <!-- LIFE SKILLS -->
    <div class="arc-section">
      <h2 class="arc-section-title">Life Skills</h2>
      <div class="arc-buttons">
        <button class="arc-btn" onclick="openLifeSkills()">Life Skills Module</button>
      </div>
    </div>

    <!-- ELECTIVES -->
    <div class="arc-section">
      <h2 class="arc-section-title">High School Electives</h2>
      <div class="arc-buttons">
        <button class="arc-btn" onclick="openElectives()">Electives Module</button>
      </div>
    </div>

    <!-- AP SUBJECTS -->
    <div class="arc-section">
      <h2 class="arc-section-title">Advanced Placement (AP)</h2>
      <div class="arc-buttons">
        <button class="arc-btn" onclick="openAP()">AP Subjects Module</button>
      </div>
    </div>

    <!-- CTE (COMING SOON) -->
    <div class="arc-section">
      <h2 class="arc-section-title">Career & Technical Education (CTE)</h2>
      <div class="arc-buttons">
        <button class="arc-btn arc-disabled">CTE Module (Coming Soon)</button>
      </div>
    </div>

  </div>

  <script>
    function openGrade(level) {
      window.location.href = `../grades/grade${level}/grade${level}.html`;
    }

    function openLifeSkills() {
      window.location.href = "../lifeskills/lifeskills.html";
    }

    function openElectives() {
      window.location.href = "../electives/electives.html";
    }

    function openAP() {
      window.location.href = "../ap/ap.html";
    }
  </script>

</body>
</html>

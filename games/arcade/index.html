<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PurpleTanuki Arcade</title>
  <link rel="stylesheet" href="arcade.css" />
</head>

<body>

  <!-- BROWSER BAR -->
  <div class="arc-browser-bar">
    <div class="arc-browser-controls">
      <span class="arc-dot red"></span>
      <span class="arc-dot yellow"></span>
      <span class="arc-dot green"></span>
    </div>
    <div class="arc-browser-url">
      <span class="arc-url-text">purpletanuki.app/arcade</span>
    </div>
  </div>

  <div class="arc-root">

    <!-- HEADER -->
    <div class="arc-header-clean">
      <h1 class="arc-title">PurpleTanuki Arcade</h1>
    </div>

    <!-- EARLY LEARNING -->
    <div class="arc-section">
      <h2 class="arc-section-title">Early Learning</h2>
      <div class="arc-buttons">

        <!-- WORKING -->
        <a class="arc-btn" href="../preschool/preschool.html">Preschool</a>
        <a class="arc-btn" href="../kindergarten/kindergarten.html">Kindergarten</a>

      </div>
    </div>

    <!-- ELEMENTARY -->
    <div class="arc-section">
      <h2 class="arc-section-title">Elementary School</h2>
      <div class="arc-buttons">

        <!-- WORKING -->
        <a class="arc-btn" href="../grade1/grade1.html">1st Grade</a>
        <a class="arc-btn" href="../grade2/grade2.html">2nd Grade</a>
        <a class="arc-btn" href="../grade3/grade3.html">3rd Grade</a>
        <a class="arc-btn" href="../grade4/grade4.html">4th Grade</a>

        <!-- COMING SOON -->
        <button class="arc-btn arc-disabled">5th Grade<br><small>Coming Soon</small></button>
      </div>
    </div>

    <!-- MIDDLE SCHOOL -->
    <div class="arc-section">
      <h2 class="arc-section-title">Middle School</h2>
      <div class="arc-buttons">

        <button class="arc-btn arc-disabled">6th Grade<br><small>Coming Soon</small></button>
        <button class="arc-btn arc-disabled">7th Grade<br><small>Coming Soon</small></button>
        <button class="arc-btn arc-disabled">8th Grade<br><small>Coming Soon</small></button>

      </div>
    </div>

    <!-- HIGH SCHOOL -->
    <div class="arc-section">
      <h2 class="arc-section-title">High School</h2>
      <div class="arc-buttons">

        <button class="arc-btn arc-disabled">9th Grade<br><small>Coming Soon</small></button>
        <button class="arc-btn arc-disabled">10th Grade<br><small>Coming Soon</small></button>
        <button class="arc-btn arc-disabled">11th Grade<br><small>Coming Soon</small></button>
        <button class="arc-btn arc-disabled">12th Grade<br><small>Coming Soon</small></button>

      </div>
    </div>

    <!-- ELECTIVES -->
    <div class="arc-section">
      <h2 class="arc-section-title">Electives</h2>
      <div class="arc-buttons">

        <button class="arc-btn arc-disabled">Electives<br><small>Coming Soon</small></button>

      </div>
    </div>

    <!-- AP -->
    <div class="arc-section">
      <h2 class="arc-section-title">Advanced Placement</h2>
      <div class="arc-buttons">

        <button class="arc-btn arc-disabled">AP Courses<br><small>Coming Soon</small></button>

      </div>
    </div>

    <!-- LIFE SKILLS -->
    <div class="arc-section">
      <h2 class="arc-section-title">Life Skills</h2>
      <div class="arc-buttons">

        <!-- ACTIVE (file coming later) -->
        <a class="arc-btn" href="../lifeskills/lifeskills.html">Life Skills Module</a>

      </div>
    </div>

  </div>

  <script src="arcade.js"></script>
</body>
</html>

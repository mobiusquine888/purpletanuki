<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../theme/tanuki-theme.css">
  <link rel="stylesheet" href="arcade.css">
</head>

<body>
  <div class="arcade-root">

    <header class="simple-header">
      <h1 class="simple-title">Purple Tanuki Arcade</h1>
    </header>

    <img src="images/tanuki_arcade.png" class="arcade-tanuki-hero" alt="Purple Tanuki">

    <p class="simple-line">Choose your world.</p>

    <div class="simple-buttons">

      <div class="simple-section-label">Curriculum Worlds</div>

      <button class="simple-button" onclick="window.location.href='../preschool/preschool.html'">
        Preschool Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../kindergarten/kindergarten.html'">
        Kindergarten Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade1/grade1.html'">
        1st Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade2/grade2.html'">
        2nd Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade3/grade3.html'">
        3rd Grade Tutor
      </button>

      <button class="simple-button" onclick="window.location.href='../grade4/grade4.html'">
        4th Grade Tutor
      </button>

    </div>

  </div>

  <script src="arcade.js"></script>
</body>
</html>

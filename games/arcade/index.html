<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Global theme -->
  <link rel="stylesheet" href="../theme/tanuki-theme.css">
  <!-- Arcade-specific styles -->
  <link rel="stylesheet" href="arcade.css">
</head>
<body>
  <div class="arcade-root">
    <header class="arcade-header">
      <div class="arcade-title-block">
        <h1 class="arcade-title">Purple Tanuki Arcade</h1>
        <p class="arcade-subtitle">Choose a ritual, a game, or a challenge.</p>
      </div>

      <div class="arcade-status">
        <div class="status-item">
          <span class="status-label">Level</span>
          <span id="status-level" class="status-value">1</span>
        </div>
        <div class="status-item">
          <span class="status-label">XP</span>
          <div class="status-bar">
            <div id="status-xp-fill" class="status-bar-fill" style="width: 20%;"></div>
          </div>
        </div>
        <div class="status-item">
          <span class="status-label">Streak</span>
          <span id="status-streak" class="status-value">0 days</span>
        </div>
      </div>
    </header>

    <main class="arcade-main">
      <section class="arcade-left">
        <div class="tanuki-orb-shell">
          <div class="tanuki-orb-core">
            <div class="tanuki-face">
              <div class="tanuki-eye tanuki-eye-left"></div>
              <div class="tanuki-eye tanuki-eye-right"></div>
              <div class="tanuki-mouth"></div>
            </div>
          </div>
        </div>
        <p id="tanuki-line" class="tanuki-line">
          I’m ready when you are. Pick a game!
        </p>
      </section>

      <section class="arcade-right">
        <h2 class="arcade-section-title">Games</h2>
        <div class="arcade-grid">

          <!-- Academic game -->
          <button class="arcade-card" data-game="knowledge">
            <div class="arcade-card-title">Study Gate</div>
            <div class="arcade-card-tag">Academic</div>
            <div class="arcade-card-desc">Answer questions, earn XP, and grow your Tanuki.</div>
          </button>

          <!-- ⭐ NEW: PRACTICE MODE BUTTON -->
          <button class="arcade-card" onclick="window.location.href='../practice/index.html'">
            <div class="arcade-card-title">Practice Mode</div>
            <div class="arcade-card-tag">Academic</div>
            <div class="arcade-card-desc">Choose a subject and difficulty. Train your skills.</div>
          </button>

          <!-- Example minigames -->
          <button class="arcade-card" data-game="reaction">
            <div class="arcade-card-title">Star Catch</div>
            <div class="arcade-card-tag">Reaction</div>
            <div class="arcade-card-desc">Tap the stars before they fade.</div>
          </button>

          <button class="arcade-card" data-game="memory">
            <div class="arcade-card-title">Moon Memory</div>
            <div class="arcade-card-tag">Memory</div>
            <div class="arcade-card-desc">Match glowing sigils in pairs.</div>
          </button>

          <button class="arcade-card" data-game="swipe">
            <div class="arcade-card-title">Path Swipe</div>
            <div class="arcade-card-tag">Swipe</div>
            <div class="arcade-card-desc">Swipe in the direction of the light.</div>
          </button>

          <!-- Coming soon -->
          <button class="arcade-card arcade-card-disabled">
            <div class="arcade-card-title">Coming Soon</div>
            <div class="arcade-card-tag">Locked</div>
            <div class="arcade-card-desc">A new ritual is forming…</div>
          </button>

        </div>
      </section>
    </main>
  </div>

  <script src="arcade.js"></script>
</body>
</html>

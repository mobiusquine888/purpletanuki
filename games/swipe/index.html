<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swipe Path</title>

  <!-- FIXED: WebView-safe absolute path + cache-buster -->
  <link rel="stylesheet" href="/games/swipe/game.css?v=3" />
</head>

<body>
  <div class="game-root">

    <div class="game-header">
      <div class="game-title">Swipe Path</div>
      <button class="back-btn" onclick="window.location.href='/games/arcade/index.html'">Back</button>
    </div>

    <div class="game-area">
      <div id="arrow" class="arrow hidden">↑</div>
    </div>

    <div class="score-panel">
      <div>Score: <span id="score">0</span></div>
      <div>Time: <span id="time">15</span>s</div>
    </div>

    <button id="startBtn" class="start-btn">Start</button>

  </div>

  <!-- ⭐ Permanent Home Button -->
  <button class="home-btn" onclick="window.location.href='/games/arcade/index.html'">
    Home
  </button>

  <!-- FIXED: absolute JS path + cache-buster -->
  <script src="/games/swipe/game.js?v=3"></script>
</body>
</html>

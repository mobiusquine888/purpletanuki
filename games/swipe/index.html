<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swipe Path</title>
  <link rel="stylesheet" href="game.css" />
</head>

<body>
  <div class="game-root">

    <div class="game-header">
      <div class="game-title">Swipe Path</div>
      <button class="back-btn" onclick="window.location.href='/games/arcade/index.html'">Back</button>
    </div>

    <div class="game-area">
      <div id="arrow" class="arrow hidden">↑</div>
    </div>

    <div class="score-panel">
      <div>Score: <span id="score">0</span></div>
      <div>Time: <span id="time">15</span>s</div>
    </div>

    <button id="startBtn" class="start-btn">Start</button>

  </div>

  <script src="game.js"></script>
</body>
</html>

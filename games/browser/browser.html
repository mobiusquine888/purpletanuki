<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki – Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0d0718;
      color: white;
      font-family: Nunito, sans-serif;
      text-align: center;
      padding-top: 20px;
    }

    #urlBar {
      width: 80%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      margin-bottom: 10px;
    }

    iframe {
      width: 90%;
      height: 70vh;
      border: none;
      border-radius: 10px;
      background: white;
    }
  </style>
</head>

<body>
  <input id="urlBar" placeholder="Enter a website…" />

  <iframe id="viewer"></iframe>

  <script>
    const blocked = ["youtube.com", "tiktok.com", "roblox.com"];

    document.getElementById("urlBar").addEventListener("change", () => {
      const url = document.getElementById("urlBar").value;

      // Check for blocked sites
      if (blocked.some(b => url.includes(b))) {
        window.location.href = "/games/ritual/index.html";
        return;
      }

      // Load safe site
      document.getElementById("viewer").src = "https://" + url;
    });
  </script>
</body>
</html>

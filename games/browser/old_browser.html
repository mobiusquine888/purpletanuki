<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Purple Tanuki – Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #0d0718;
      color: white;
      font-family: Nunito, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    /* URL BAR */
    #urlInput {
      width: 85%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      margin-bottom: 10px;
      background: #1e1533;
      color: #e8ddff;
    }

    /* BUTTON ROW */
    .nav-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .nav-buttons button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #4b1e78;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .nav-buttons button:hover {
      background: #6a4fbf;
    }

    /* IFRAME */
    #browserFrame {
      width: 90%;
      height: 70vh;
      border: none;
      border-radius: 10px;
      background: white;
    }
  </style>
</head>

<body>

  <!-- URL INPUT -->
  <input id="urlInput" placeholder="Enter a website…" />

  <!-- BACK / FORWARD / GO -->
  <div class="nav-buttons">
    <button id="backBtn">Back</button>
    <button id="forwardBtn">Forward</button>
    <button id="goBtn">Go</button>
  </div>

  <!-- IFRAME VIEWER -->
  <iframe id="browserFrame"></iframe>

  <!-- SCRIPT -->
  <script src="browser.js"></script>

</body>
</html>

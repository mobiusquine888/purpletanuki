<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki – Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #1a0f2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Nunito, sans-serif;
      text-align: center;
    }

    .tanuki {
      width: 180px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div>
    <img src="/games/ritual/images/tanuki_neutral.png" class="tanuki">
    <p>Take a breath with me…</p>
  </div>

  <script>
    // After 3 seconds → go to Arcade
    setTimeout(() => {
      window.location.href = "/games/arcade/index.html";
    }, 3000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purple Tanuki – Ritual Gate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Global Tanuki theme -->
  <link rel="stylesheet" href="/games/theme/tanuki-theme.css">
  <!-- Ritual-specific styles -->
  <link rel="stylesheet" href="ritual.css">
</head>
<body>
  <div class="ritual-root">
    <div class="ritual-bg-glow"></div>

    <div class="ritual-content">

      <!-- ⭐ Breathing Tanuki Image (NEW + CORRECT PATH) -->
      <img src="images/tanuki_neutral.png?v=5" class="ritual-tanuki">

      <div class="tanuki-orb">
        <div class="tanuki-silhouette"></div>
        <div class="tanuki-orb-glow"></div>
      </div>

      <div class="ritual-text">
        <div id="ritual-phase" class="ritual-phase">Breathe with me…</div>
        <div id="ritual-subtext" class="ritual-subtext">
          Inhale as the light grows. Exhale as it fades.
        </div>
      </div>

      <button id="ritual-button" class="ritual-button" disabled>
        Opening gate…
      </button>
    </div>
  </div>

  <script src="ritual.js"></script>

</html>

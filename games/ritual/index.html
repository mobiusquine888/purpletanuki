<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purple Tanuki – Gate Ritual</title>

  <link rel="stylesheet" href="/games/theme/tanuki-theme.css" />

  <style>
    body {
      margin: 0;
      background: #1a0f2e;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Nunito, sans-serif;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .ritual-container {
      max-width: 400px;
      animation: fadeIn 1.2s ease forwards;
    }

    .tanuki-orb-image {
      width: 180px;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards, float 4s ease-in-out infinite;
    }

    #ritual-phase {
      margin-top: 20px;
      font-size: 1.6rem;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards 0.4s;
    }

    #ritual-subtext {
      margin-top: 10px;
      font-size: 1.1rem;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards 0.8s;
    }

    #ritual-button {
      display: none;
      margin-top: 28px;
      padding: 12px 22px;
      background: #6a4bc3;
      border-radius: 10px;
      color: white;
      font-size: 1.2rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="ritual-container">

    <img
      id="tanuki-orb"
      class="tanuki-orb-image"
      src="/games/ritual/images/tanuki_neutral.png"
    />

    <div id="ritual-phase">Take a deep breath…</div>
    <div id="ritual-subtext"></div>

    <button id="ritual-button">Enter the Gate</button>

  </div>

  <script src="ritual.js"></script>
</body>
</html>

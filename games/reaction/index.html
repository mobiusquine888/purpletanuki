<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Star Catch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../theme/tanuki-theme.css">
  <link rel="stylesheet" href="game.css">
</head>
<body>

  <div class="game-root">
    <header class="game-header">
      <h1 class="game-title">Star Catch</h1>
      <button class="back-btn" onclick="window.location.href='/games/arcade/index.html'">← Back</button>
    </header>

    <div id="game-area" class="game-area"></div>

    <div class="score-panel">
      <div>Score: <span id="score">0</span></div>
      <div>Time: <span id="timer">15</span>s</div>
    </div>

    <button id="startBtn" class="start-btn">Start</button>
  </div>

  <!-- ⭐ Permanent Home Button -->
  <button class="home-btn" onclick="window.location.href='/games/arcade/index.html'">
    Home
  </button>

  <script src="game.js"></script>
</body>
</html>

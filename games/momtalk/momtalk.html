<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mom Talk — PurpleTanuki</title>

  <link rel="stylesheet" href="../theme/tanuki-theme.css" />
  <link rel="stylesheet" href="momtalk.css" />
</head>

<body>

  <div class="mt-root">

    <!-- HEADER -->
    <header class="mt-header">
      <button class="mt-home-btn" onclick="goHome()">Home</button>
      <h1 class="mt-title">Mom Talk</h1>
    </header>

    <!-- PROGRESS -->
    <div class="mt-progress-bar">
      <div id="mt-progress-fill" class="mt-progress-fill"></div>
    </div>
    <div id="mt-progress-text" class="mt-progress-text">0%</div>

    <!-- LESSON LIST -->
    <div class="mt-lessons">
      <button class="mt-lesson-btn" onclick="loadLesson(0)">
        Lesson 1: Being Kind to Yourself
        <div id="lesson-status-0" class="mt-status-text">0 / 1 quiz</div>
      </button>
    </div>

    <!-- LESSON CARD -->
    <div id="mt-lesson-card" class="mt-card" style="display:none;">
      <div class="mt-card-header">
        <div id="mt-lesson-title" class="mt-card-title"></div>
      </div>

      <div id="mt-lesson-body" class="mt-card-body"></div>

      <button id="mt-start-quiz-btn" class="mt-start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- QUIZ CARD -->
    <div id="mt-quiz-card" class="mt-card" style="display:none;">
      <div class="mt-card-header">
        <div id="mt-quiz-title" class="mt-card-title"></div>
        <div id="mt-quiz-progress" class="mt-card-progress"></div>
      </div>

      <div id="mt-quiz-prompt" class="mt-card-body"></div>

      <div class="mt-choices">
        <button id="mt-choice-1" class="mt-choice-btn"></button>
        <button id="mt-choice-2" class="mt-choice-btn"></button>
        <button id="mt-choice-3" class="mt-choice-btn"></button>
      </div>

      <button class="mt-back-btn" onclick="backToLesson()">Back to Lesson</button>
    </div>

    <!-- SPARKLES -->
    <div id="mt-sparkles" class="mt-sparkles"></div>

    <!-- COMPLETION OVERLAY -->
    <div id="mt-grad-overlay" class="mt-grad-overlay" style="display:none;">
      <div class="mt-grad-box">
        <h2>💛 Beautiful Work 💛</h2>
        <p>You completed Mom Talk Lesson 1.</p>
        <button class="mt-grad-btn" onclick="finishMomTalk()">Continue</button>
      </div>
    </div>

  </div>

  <script src="momtalk.js"></script>

  <a href="/games/arcade/index.html" class="home-btn">Home</a>

</body>
</html>

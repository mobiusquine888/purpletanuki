<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>6th Grade Tutor — Purple Tanuki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- THEME + GRADE 6 STYLES -->
  <link rel="stylesheet" href="../theme/tanuki-theme.css">
  <link rel="stylesheet" href="grade6.css">
</head>

<body>
  <div class="g6-root">

    <!-- HEADER -->
    <header class="g6-header">
      <button class="g6-home-btn" onclick="goHome()">Home</button>
      <h1 class="g6-title">6th Grade Tutor</h1>
    </header>

    <!-- GLOBAL PROGRESS -->
    <div class="g6-progress-bar">
      <div id="g6-progress-fill" class="g6-progress-fill"></div>
    </div>
    <div id="g6-progress-text" class="g6-progress-text">0%</div>

    <!-- SUBJECT BUTTONS -->
    <div class="g6-subjects">
      <button class="g6-subject-btn" data-subject="reading" onclick="selectSubject('reading')">
        Reading & Writing
        <div id="reading-status" class="g6-status-text">0 / 3 lessons</div>
      </button>

      <button class="g6-subject-btn" data-subject="math" onclick="selectSubject('math')">
        Math
        <div id="math-status" class="g6-status-text">0 / 3 lessons</div>
      </button>

      <button class="g6-subject-btn" data-subject="science" onclick="selectSubject('science')">
        Science
        <div id="science-status" class="g6-status-text">0 / 3 lessons</div>
      </button>

      <button class="g6-subject-btn" data-subject="social" onclick="selectSubject('social')">
        Social Studies
        <div id="social-status" class="g6-status-text">0 / 3 lessons</div>
      </button>

      <button class="g6-subject-btn" data-subject="logic" onclick="selectSubject('logic')">
        Logic & Patterns
        <div id="logic-status" class="g6-status-text">0 / 3 lessons</div>
      </button>
    </div>

    <!-- LESSON CARD -->
    <div id="g6-lesson-card" class="g6-card" style="display:none;">
      <div class="g6-card-header">
        <div id="g6-lesson-subject-label" class="g6-card-subject"></div>
        <div id="g6-lesson-title" class="g6-card-title"></div>
      </div>

      <div id="g6-lesson-body" class="g6-card-body"></div>

      <button id="g6-start-quiz-btn" class="g6-start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- QUIZ CARD -->
    <div id="g6-quiz-card" class="g6-card" style="display:none;">
      <div class="g6-card-header">
        <div id="g6-quiz-subject-label" class="g6-card-subject"></div>
        <div id="g6-quiz-title" class="g6-card-title"></div>
        <div id="g6-quiz-lesson-label" class="g6-card-lesson"></div>
        <div id="g6-quiz-q-progress" class="g6-card-progress"></div>
      </div>

      <div id="g6-quiz-prompt" class="g6-card-body"></div>

      <div class="g6-choices">
        <button id="g6-choice-1" class="g6-choice-btn"></button>
        <button id="g6-choice-2" class="g6-choice-btn"></button>
        <button id="g6-choice-3" class="g6-choice-btn"></button>
      </div>

      <button class="g6-back-btn" onclick="backToLesson()">Back to Lesson</button>
    </div>

    <!-- SPARKLES -->
    <div id="g6-sparkles" class="g6-sparkles"></div>

    <!-- GRADUATION OVERLAY -->
    <div id="g6-grad-overlay" class="g6-grad-overlay" style="display:none;">
      <div class="g6-grad-box">
        <h2>🎉 You finished 6th Grade! 🎉</h2>
        <p>You completed all lessons in every subject.</p>
        <button class="g6-grad-btn" onclick="unlockGrade6Reward()">Continue</button>
      </div>
    </div>

  </div>

  <!-- ENGINE + GRADE 6 DATA -->
  <script src="../engine/subject-engine.js"></script>
  <script src="grade6.js"></script>

  <!-- INITIALIZE -->
  <script>
    loadSubjects(g6Subjects, "6th Grade Tutor");
  </script>

</body>
</html>
